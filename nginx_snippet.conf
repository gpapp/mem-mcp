# 3. Mem0 MCP Server (SSE Transport)
location /mcp/ {
        auth_basic "Architectural Tool Vault";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://localhost:8086/;

        # Critical for SSE (Server-Sent Events)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Cache-Control "no-cache";
        proxy_set_header X-Accel-Buffering "no"; # Tells Nginx not to buffer the stream

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h; # Keeps the AI connection from dropping during idle
        chunked_transfer_encoding on;

        # 5. Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Remote-User $remote_user;
}
