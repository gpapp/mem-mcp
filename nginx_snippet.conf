# 3. Memory Vault MCP Server (SSE Transport)
# This location strips the /mcp/ prefix and forwards to the container root.
# Both the SSE stream (/mcp → served at external /mcp/mcp)
# and the message endpoint (/messages/ → served at external /mcp/messages/)
# are accessible through this single location block.
# The server must be started with BASE_URL=https://<host>/mcp so that
# uvicorn sets root_path=/mcp and the SSE endpoint event sends /mcp/messages/.
# Client config: claude mcp add --transport sse memory-vault https://<host>/mcp/mcp
location /mcp/ {
        auth_basic "Architectural Tool Vault";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://localhost:8086/;

        # Critical for SSE (Server-Sent Events)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Cache-Control "no-cache";
        proxy_set_header X-Accel-Buffering "no"; # Tells Nginx not to buffer the stream

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h; # Keeps the AI connection from dropping during idle
        chunked_transfer_encoding on;

        # 5. Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Remote-User $remote_user;
}
